name: terraform

on:
  push:
    branches-ignore:
      - main
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"
  pull_request:
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"
  workflow_run:
    workflows:
      - ci
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    if: ${{ github.event_name != 'workflow_run' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./terraform
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.11.3
          terraform_wrapper: false

      - name: Initialize Terraform Without Backend
        run: terraform init -backend=false

      - name: Check Terraform Formatting
        run: terraform fmt -check

      - name: Validate Terraform
        run: terraform validate

  pr-plan:
    if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    defaults:
      run:
        working-directory: ./terraform
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.11.3
          terraform_wrapper: false

      - name: Initialize Terraform
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SCW_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SCW_SECRET_KEY }}
          SCW_ACCESS_KEY: ${{ secrets.SCW_ACCESS_KEY }}
          SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
        run: terraform init -backend-config="bucket=${{ secrets.BUCKET_TF_STATE }}"

      - name: Read current image tag from state
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SCW_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SCW_SECRET_KEY }}
          SCW_ACCESS_KEY: ${{ secrets.SCW_ACCESS_KEY }}
          SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          image_tag=$(
            terraform state pull \
              | jq -r '.resources[]
                | select(.type == "scaleway_container" and .name == "main")
                | .instances[0].attributes.registry_image'
          )
          echo "TF_VAR_container_image_tag=${image_tag}" >> "$GITHUB_ENV"

      - name: Run Terraform Plan
        env:
          TF_VAR_organization_id: ${{ secrets.TF_VAR_organization_id }}
          TF_VAR_project_id: ${{ secrets.TF_VAR_PROJECT_ID }}
          AWS_ACCESS_KEY_ID: ${{ secrets.SCW_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SCW_SECRET_KEY }}
          SCW_ACCESS_KEY: ${{ secrets.SCW_ACCESS_KEY }}
          SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          terraform plan -no-color > ../tfplan.txt

      - name: Sanitize Terraform Plan Output
        shell: bash
        run: |
          set -euo pipefail
          sed \
            -e '/Refreshing state\.\.\./d' \
            -e '/Reading\.\.\./d' \
            -e '/Read complete/d' \
            -e '/^$/N;/^\n$/D' \
            ../tfplan.txt > ../tfplan-sanitized.txt

      - name: Comment Terraform Plan on PR
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          {
            echo "## Terraform Plan"
            echo
            echo '```'
            sed -n '1,600p' ../tfplan-sanitized.txt
            echo '```'
          } > ../tfplan-comment.md
          existing_comment_id=$(
            gh pr view ${{ github.event.pull_request.number }} \
              --repo ${{ github.repository }} \
              --json comments \
              --jq '.comments
                | map(select(.author.login == "github-actions" and (.body | startswith("## Terraform Plan"))))
                | last
                | .id // empty'
          )

          if [ -n "${existing_comment_id}" ]; then
            comment_body="$(cat ../tfplan-comment.md)"
            gh api \
              --method PATCH \
              repos/${{ github.repository }}/issues/comments/${existing_comment_id} \
              --raw-field body="${comment_body}"
          else
            gh pr comment ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --body-file ../tfplan-comment.md
          fi

  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    defaults:
        run:
          working-directory: ./terraform
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download image info
        uses: actions/download-artifact@v4
        with:
          name: image-info
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Set image tag variable
        run: |
          source ../image_info.txt
          echo "TF_VAR_container_image_tag=${IMAGE_TAG}" >> $GITHUB_ENV

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.11.3
          terraform_wrapper: false

      - name: Initialize Terraform
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SCW_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SCW_SECRET_KEY }}
          SCW_ACCESS_KEY: ${{ secrets.SCW_ACCESS_KEY }}
          SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
        run: terraform init -backend-config="bucket=${{ secrets.BUCKET_TF_STATE }}"

      - name: Plan Terraform Changes
        env:
          TF_VAR_organization_id: ${{ secrets.TF_VAR_organization_id }}
          TF_VAR_project_id: ${{ secrets.TF_VAR_PROJECT_ID }}
          AWS_ACCESS_KEY_ID: ${{ secrets.SCW_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SCW_SECRET_KEY }}
          SCW_ACCESS_KEY: ${{ secrets.SCW_ACCESS_KEY }}
          SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
        shell: bash
        run: |
          set -o pipefail
          terraform plan | grep -v "Refreshing state\|Reading\|Read complete"

      - name: Apply Terraform Changes
        env:
          TF_VAR_organization_id: ${{ secrets.TF_VAR_organization_id }}
          TF_VAR_project_id: ${{ secrets.TF_VAR_PROJECT_ID }}
          AWS_ACCESS_KEY_ID: ${{ secrets.SCW_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SCW_SECRET_KEY }}
          SCW_ACCESS_KEY: ${{ secrets.SCW_ACCESS_KEY }}
          SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
        shell: bash
        run: |
          set -o pipefail
          terraform apply -auto-approve | grep -v "Refreshing state\|Reading\|Read complete"
